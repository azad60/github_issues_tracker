<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>github issues tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="geist">
  <div class="main_container">
    <div class="box_container">
    <div class="box_head">
      <img src="./assets/github-logo.png" alt="">
      <h2>Github Issues Tracker</h2>
      <h3>sign in to manage your issues</h3>
    </div>
    <form class="form_content" action="./index.html">
      <div>
        <label for="Username">Username</label>
        <input class="form_content_input" id="username" type="text" placeholder="Enter Username">
        <p class="default_text">Default: admin</p>
      </div>
      <div>
        <label for="">Password</label>
        <input id="password" class="form_content_input" type="password" placeholder="Enter Username">
        <p class="default_text">Default: admin123</p>
      </div>
      <button type="button" onclick="login()" class="sign_btn">Sign In</button>
    </form>
    <div class="bottom_stroke"><span></span>OR<span></span></div>
    <div class="box_bottom">
      <h3>Demo Credentials:</h3>
      <div class="box_bottom_content">
        <p><b>Username:</b> admin</p>
        <p><b>Password:</b> admin123</p>
      </div>
    </div>
  </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
